name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: LevelSensorMonitor.exe
            artifact: dist/LevelSensorMonitor.exe
            python_cmd: python

          - os: ubuntu-latest
            name: LevelSensorMonitor-linux-x64
            artifact: dist/LevelSensorMonitor
            python_cmd: python3.11

          - os: ubuntu-24.04-arm
            name: LevelSensorMonitor-linux-arm64
            artifact: dist/LevelSensorMonitor
            python_cmd: python3.11

          - os: macos-latest
            name: LevelSensorMonitor-mac-arm64
            artifact: dist/LevelSensorMonitor
            python_cmd: python3.11

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (Windows / Linux)
        if: "!startsWith(matrix.os, 'macos')"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Python + Tkinter (macOS — Homebrew framework build)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install python@3.11 python-tk@3.11
          echo "$(brew --prefix python@3.11)/bin" >> $GITHUB_PATH

      - name: Install Tkinter (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          ${{ matrix.python_cmd }} -m pip install -r requirements.txt
          ${{ matrix.python_cmd }} -m pip install pyinstaller

      - name: Build binary
        run: ${{ matrix.python_cmd }} -m PyInstaller --onefile --windowed --name LevelSensorMonitor level_sensor_monitor.py

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ matrix.artifact }}" != "dist/${{ matrix.name }}" ]; then
            mv "${{ matrix.artifact }}" "dist/${{ matrix.name }}"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.name }}
          generate_release_notes: true
